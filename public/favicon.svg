  <!-- Stem -->
  <rect x="54" y="8" width="6" height="66" rx="3" fill="white"/>
  <!-- Flag -->
  <path d="M 60 8 C 96 6 96 44 74 53 C 64 58 60 51 60 46"
        stroke="white" stroke-width="7" fill="none"
