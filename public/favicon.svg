<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="r">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Teal background, clipped to rounded square -->
