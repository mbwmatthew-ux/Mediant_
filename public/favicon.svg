<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Teal background -->
  <rect width="100" height="100" rx="20" fill="#0D8F8C"/>

  <!-- White music note -->
  <!-- Note head (large circle, slightly tilted) -->
  <ellipse cx="38" cy="70" rx="17" ry="15" fill="white"/>
  <!-- Stem -->
  <rect x="53" y="20" width="5" height="52" rx="2.5" fill="white"/>
  <!-- Flag — smooth hook curving right then back -->
  <path d="M 58 20 C 90 18 90 46 72 54 C 64 58 58 52 58 47"
        stroke="white" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Coral glasses — left lens -->
  <rect x="17" y="63" width="24" height="16" rx="5" fill="#E8614A"/>
  <!-- Left lens glass — white (transparent over note head) -->
  <rect x="21" y="67" width="16" height="8" rx="2.5" fill="white"/>

  <!-- Coral glasses — right lens -->
  <rect x="43" y="63" width="24" height="16" rx="5" fill="#E8614A"/>
  <!-- Right lens glass — white -->
  <rect x="47" y="67" width="16" height="8" rx="2.5" fill="white"/>

  <!-- Bridge between lenses -->
  <rect x="41" y="67" width="2" height="6" fill="#E8614A"/>
</svg>
