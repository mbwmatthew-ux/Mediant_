  <!-- Coral glasses — left -->
  <rect x="11" y="64" width="26" height="17" rx="5" fill="#E8614A"/>
  <rect x="15" y="68" width="18" height="9" rx="3" fill="white"/>

  <!-- Coral glasses — right -->
  <rect x="39" y="64" width="26" height="17" rx="5" fill="#E8614A"/>
  <rect x="43" y="68" width="18" height="9" rx="3" fill="white"/>

  <!-- Bridge -->
